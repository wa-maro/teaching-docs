<mat-sidenav-container class="h-screen bg-slate-100">
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile()"
    class="border-r border-slate-200 bg-white shadow-sm"
  >
    <app-sidebar-nav [links]="links" />
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar
      color="primary"
      class="sticky top-0 z-10 flex justify-between border-b border-slate-200"
    >
      <div class="flex items-center gap-2">
        <button mat-icon-button class="lg:hidden" (click)="sidenav.toggle()">
          <mat-icon>menu</mat-icon>
        </button>

        <span>Admin</span>
      </div>
    </mat-toolbar>

    <main class="px-6 py-3">
      <div class="mb-6">
        <h1 class="text-2xl font-semibold text-slate-800">
          {{ title }}
        </h1>
      </div>

      <div class="rounded-xl bg-white p-6 shadow-sm">
        <router-outlet />
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
